# ============================================================
#  Nexus Bridge — Blueprint do Render
#  Suba via: Render Dashboard -> New -> Blueprint (aponte para este repo).
#  Depois mapeie o domínio api.nexusholding.xyz no serviço (ver README).
# ============================================================
services:
  - type: web
    name: nexus-bridge
    runtime: node
    plan: starter
    region: oregon
    branch: master
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://www.nexusholding.xyz,https://nexusholding.vercel.app
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: RATE_LIMIT_DATA_WRITE_MAX
        value: "30"
      - key: DATA_MAX_LIMIT
        value: "200"
      - key: DATA_UPLOAD_MAX
        value: "26214400"
      - key: TELEMETRY_BUFFER
        value: "200"
      - key: SSE_MAX_CLIENTS
        value: "50"
      - key: SUPABASE_STORAGE_BUCKET
        value: nexus-media
      - key: ADMIN_WRITE
        value: "false"
      - key: FIREBASE_CHECK_REVOKED
        value: "false"
      # Segredos: definir manualmente no painel (sync:false NÃO grava valor aqui).
      - key: KEY_CRM
        sync: false
      - key: KEY_MIDIA
        sync: false
      - key: MIDIA_URL
        sync: false
      - key: MIDIA_UPSTREAM_KEY
        sync: false
      # Data API — credenciais dos bancos (poder total: mantenha em segredo).
      - key: FIREBASE_SA_GARDEN_B64
        sync: false
      - key: FIREBASE_SA_POSTFLOW_B64
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Painel — allowlist de e-mails autorizados (login Firebase).
      - key: ADMIN_EMAILS
        sync: false
